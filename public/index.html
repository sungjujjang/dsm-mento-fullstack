<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memo Board</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">Week 4</p>
          <h1>Memo Board</h1>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </header>

      <section class="panel">
        <h2 id="form-title">새 메모</h2>
        <form id="memo-form">
          <label>
            제목
            <input name="title" placeholder="제목을 입력하세요" required />
          </label>
          <label>
            내용
            <textarea name="content" placeholder="내용을 입력하세요"></textarea>
          </label>
          <label>
            이미지 URL
            <input name="image_url" placeholder="선택 사항" />
          </label>
          <div class="form-actions">
            <button type="submit" id="submit-button">저장</button>
            <button type="button" id="cancel-edit" hidden>취소</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="list-header">
          <h2>메모 목록</h2>
          <input id="search-input" placeholder="제목 또는 내용 검색" />
        </div>
        <ul id="memo-list" class="memo-list"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
